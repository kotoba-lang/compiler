name: browser-matrix
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  browser-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.12.0"
          cache: npm
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 1.12.5.1654
      - run: npm ci
      - run: npm run test-windows-profile
        if: runner.os == 'Windows'
      - run: node node_modules/@playwright/test/cli.js install --with-deps chromium firefox webkit chrome msedge chrome-beta msedge-beta
        if: runner.os == 'Linux'
      - run: node node_modules/@playwright/test/cli.js install chromium firefox webkit chrome msedge chrome-beta msedge-beta
        if: runner.os == 'Windows'
      - run: npm run test-browsers
        env:
          KOTOBA_BRANDED_BROWSERS: "1"
          # chrome-beta/msedge-beta: forward-looking pre-stable channel signal, not a
          # previous-version pin -- see playwright.config.mjs.
          KOTOBA_BETA_BROWSERS: "1"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: browser-evidence-${{ runner.os }}
          path: test-results/browser-evidence.json
          if-no-files-found: error
          retention-days: 30
  safari:
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24.12.0"
          cache: npm
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 1.12.5.1654
      - run: npm ci
      - run: sudo safaridriver --enable
      - run: npm run test-safari
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: browser-evidence-Safari
          path: test-results/browser-evidence.json
          if-no-files-found: error
          retention-days: 30
