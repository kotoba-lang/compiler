name: test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
      - run: npm ci
      - run: clojure -M:test
        env:
          KOTOBA_FUZZ_SEED: "5426643073673934426"
          KOTOBA_FUZZ_CASES: "1000"
      - run: |
          printf '(defn main [] (+ 40 2))\n' > /tmp/ci.kotoba
          bin/kotoba -M compile /tmp/ci.kotoba --target x86_64 --output /tmp/ci.kexe
          bin/kotoba -M verify /tmp/ci.kexe
      - run: npx nbb scripts/conformance.cljs
      - run: npx nbb scripts/sanitizer.cljs
      - run: npx nbb scripts/fuzz-native.cljs
        env:
          KOTOBA_NATIVE_FUZZ_RUNS: "20000"
      - run: npx nbb scripts/test-review-fuzz-corpus.cljs
