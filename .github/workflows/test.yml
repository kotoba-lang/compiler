name: test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
      - run: clojure -M:test
      - run: |
          printf '(defn main [] (+ 40 2))\n' > /tmp/ci.kotoba
          bin/kotoba -M compile /tmp/ci.kotoba --target x86_64 --output /tmp/ci.kexe
          bin/kotoba -M verify /tmp/ci.kexe
      - run: scripts/conformance.sh
