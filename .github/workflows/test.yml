name: test
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  android-ndk:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.12.0"
          cache: npm
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 1.12.5.1654
      - run: npm ci
      - run: npm run test-android-ndk
  server-kind:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.12.0"
          cache: npm
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 1.12.5.1654
      - run: npm ci
      - run: npm run test-kind-server
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.12.0"
          cache: npm
      - uses: DeLaGuardo/setup-clojure@4c7a6f613e5089821bb3bb2a33a3ee115578580d # 13.6.1
        with:
          cli: 1.12.5.1654
      - run: npm ci
      - run: npx nbb scripts/check-workflows.cljs
      - run: npm run test-browser-host
      - run: npm run test-worker-host
      - run: npm run test-wasi-host
      - run: npm run test-wasi-service
      - run: npm run test-release
      - run: npm run test-wasmtime
      - if: matrix.os == 'macos-14'
        run: npm run test-ios-aot
        env:
          DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
      - run: clojure -M:test
        env:
          KOTOBA_FUZZ_SEED: "5426643073673934426"
          KOTOBA_FUZZ_CASES: "1000"
      - run: |
          printf '(defn main [] (+ 40 2))\n' > /tmp/ci.kotoba
          bin/kotoba -M compile /tmp/ci.kotoba --target x86_64 --output /tmp/ci.kexe
          bin/kotoba -M verify /tmp/ci.kexe
      - run: npx nbb scripts/conformance.cljs
      - run: npx nbb scripts/sanitizer.cljs
      - run: npx nbb scripts/fuzz-native.cljs
        env:
          KOTOBA_NATIVE_FUZZ_RUNS: "20000"
      - run: npx nbb scripts/test-review-fuzz-corpus.cljs
