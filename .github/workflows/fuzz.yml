name: long-fuzz

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      seconds:
        description: "libFuzzer duration in seconds"
        required: false
        default: "300"

permissions:
  contents: read

jobs:
  native-parser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.3.0
        with:
          node-version: "24.12.0"
          cache: npm
      - run: npm ci
      - name: Run coverage-guided native parser fuzzing
        env:
          KOTOBA_NATIVE_FUZZ_SECONDS: ${{ inputs.seconds || '300' }}
          KOTOBA_FUZZ_ARTIFACT_DIR: fuzz-results
        run: npx nbb scripts/fuzz-native.cljs
      - name: Preserve evolved corpus and crash inputs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-parser-fuzz-${{ github.run_id }}
          path: fuzz-results
          if-no-files-found: error
          retention-days: 30
